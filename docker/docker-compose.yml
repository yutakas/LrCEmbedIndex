name: lrcembedindex

services:
  lrcembedindex:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lrcembedindex
    restart: unless-stopped
    ports:
      - "8600:8600"
    volumes:
      # Mount host index/metadata folder into the container.
      # Change the left side to your actual host path.
      - ${INDEX_FOLDER:-./data}:/data
      # Mount host photo folder(s) for auto patrol
      - ${PHOTO_FOLDER:-./photos}:/photos
      # Persist the encryption key across container rebuilds
      - lrcembedindex-key:/root
    environment:
      # Timezone — ensures patrol time windows and timestamps use local time.
      # Auto-detected by rebuild.sh; override with TZ in .env if needed.
      - TZ=${TZ:-UTC}
      # Server config — set in .env, overrides saved JSON config on restart.
      - INDEX_FOLDER=/data
      - PHOTO_FOLDER=/photos
      - VISION_MODE=${VISION_MODE:-ollama}
      - OLLAMA_VISION_ENDPOINT=${OLLAMA_VISION_ENDPOINT:-http://host.docker.internal:11434}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-}
      - CLAUDE_VISION_MODEL=${CLAUDE_VISION_MODEL:-}
      - EMBED_MODE=${EMBED_MODE:-ollama}
      - OLLAMA_EMBED_ENDPOINT=${OLLAMA_EMBED_ENDPOINT:-http://host.docker.internal:11434}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-}
      - OPENAI_EMBED_MODEL=${OPENAI_EMBED_MODEL:-}
      - VOYAGE_EMBED_MODEL=${VOYAGE_EMBED_MODEL:-}
      - SEARCH_MAX_RESULTS=${SEARCH_MAX_RESULTS:-}
      - SEARCH_RELEVANCE=${SEARCH_RELEVANCE:-}
      - THUMBNAIL_STORE_SIZE=${THUMBNAIL_STORE_SIZE:-}
      - STRIP_GPS_FOR_CLOUD=${STRIP_GPS_FOR_CLOUD:-}
      - DEBUG_LOGGING=${DEBUG_LOGGING:-}
      - PATROL_ENABLED=${PATROL_ENABLED:-}
      - PATROL_INTERVAL_MINUTES=${PATROL_INTERVAL_MINUTES:-}
      - PATROL_BATCH_SIZE=${PATROL_BATCH_SIZE:-}
      - PATROL_START_TIME=${PATROL_START_TIME:-}
      - PATROL_END_TIME=${PATROL_END_TIME:-}

volumes:
  lrcembedindex-key:
